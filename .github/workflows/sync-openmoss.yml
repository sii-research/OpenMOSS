name: Sync OpenMOSS

on:
  schedule:
    # Every Monday at 06:00 UTC (14:00 Beijing time)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch OpenMOSS repositories
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pull every non-fork, non-archived repo from OpenMOSS that has a description.
          # This filters out infrastructure repos (.github, demo-repository, etc.) and
          # forks (mlx-audio, llama.cpp, sglang, etc.) automatically.
          gh api "orgs/OpenMOSS/repos?per_page=100&sort=updated" \
            --jq '[.[] | select(.fork == false and .archived == false and .description != null and .description != "") | {name, description, stars: .stargazers_count, updated: .updated_at}]' \
            > repos.json
          echo "Fetched $(jq length repos.json) candidate repos."

      - name: Detect new repositories
        id: detect
        run: |
          # Extract repos currently linked from the README.
          grep -oE 'github\.com/OpenMOSS/[A-Za-z][A-Za-z0-9_.-]*' README.md \
            | sed 's|github.com/OpenMOSS/||' \
            | sed 's/\.\(svg\|png\|jpg\|gif\|md\)$//' \
            | sort -u > tracked.txt
          echo "Tracked in README: $(wc -l < tracked.txt) repo(s)"

          # All candidate OpenMOSS repos from API.
          jq -r '.[].name' repos.json | sort -u > all.txt

          # Honor an optional ignore list. Add repo names (one per line) to
          # .github/sync-ignore.txt to permanently skip them — useful for demos,
          # one-off forks, or anything the team doesn't want to feature.
          if [ -f .github/sync-ignore.txt ]; then
            grep -vxFf .github/sync-ignore.txt all.txt > all.filtered.txt || true
            mv all.filtered.txt all.txt
            echo "After ignore list: $(wc -l < all.txt) repo(s) remain"
          fi

          # New = in API list but not yet tracked.
          comm -23 all.txt tracked.txt > new.txt

          COUNT=$(grep -c . new.txt 2>/dev/null || echo 0)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -gt 0 ]; then
            echo "New repos to propose:"
            cat new.txt
          else
            echo "No new repos detected. Nothing to do."
          fi

      - name: Build PR body and bump timestamp
        if: steps.detect.outputs.count != '0'
        run: |
          TODAY=$(date -u +%Y-%m-%d)

          # Bump the "Last updated" line in README.
          sed -i "s/_Last updated: [0-9-]*_/_Last updated: ${TODAY}_/" README.md

          # Compose PR body with a curation checklist.
          {
            echo "## 🆕 ${{ steps.detect.outputs.count }} new OpenMOSS repository(s) detected"
            echo ""
            echo "The following repositories exist under [OpenMOSS](https://github.com/OpenMOSS) but are not yet linked from this README."
            echo ""
            echo "**Please review each one and either:**"
            echo "- ✅ Edit this PR to add it under the appropriate section (\`# Projects\` or \`# Research\`)"
            echo "- ❌ Skip (close this PR or remove the row) — for forks, demos, internal tools, or anything not worth featuring"
            echo ""
            echo "| Repo | ⭐ | Description |"
            echo "|---|---|---|"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              jq --arg n "$name" -r '.[] | select(.name == $n) | "| [`\(.name)`](https://github.com/OpenMOSS/\(.name)) | \(.stars) | \(.description | gsub("\\|"; "\\|")) |"' repos.json
            done < new.txt
            echo ""
            echo "---"
            echo ""
            echo "_This PR was auto-generated by [\`.github/workflows/sync-openmoss.yml\`](.github/workflows/sync-openmoss.yml). It re-runs every Monday._"
          } > pr_body.md

          echo "----- PR body preview -----"
          cat pr_body.md

      - name: Open / update Pull Request
        if: steps.detect.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          # Use a PAT (stored as repo secret SYNC_TOKEN) because the
          # sii-research org policy blocks the default GITHUB_TOKEN from
          # creating pull requests. The PAT needs Contents: RW and
          # Pull requests: RW on sii-research/OpenMOSS.
          token: ${{ secrets.SYNC_TOKEN }}
          branch: sync/openmoss
          delete-branch: true
          commit-message: "chore: sync OpenMOSS (${{ steps.detect.outputs.count }} new repo(s))"
          title: "Sync OpenMOSS: ${{ steps.detect.outputs.count }} new repo(s) detected"
          body-path: pr_body.md
          # Only commit README — keep intermediate working files (repos.json,
          # new.txt, tracked.txt, pr_body.md, etc.) out of the PR.
          add-paths: README.md
          labels: |
            sync
            openmoss
